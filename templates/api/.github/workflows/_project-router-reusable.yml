# Project Router
# Reusable workflow that routes issues and PRs to a GitHub Project v2.
# Dynamically creates columns per contributor and moves items along their lifecycle.
#
# Usage in another repo:
#   jobs:
#     route:
#       uses: your-org/github-ops/.github/workflows/project-router.yml@main
#       secrets:
#         PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
#       with:
#         project-owner: your-org
#         project-number: 1
#
# Prerequisite (configured by the /new-project skill):
#   - PROJECT_TOKEN secret in the repo, with `project` + `repo` scopes.
#   - By default the skill copies the developer's PAT to the repo automatically.
#
# Behavior:
#   - issues.opened/reopened: creates the author's (or assignee's) column if missing; moves it there.
#   - issues.assigned/unassigned: re-routes only if still in backlog (does not disrupt the flow).
#   - issues.closed: moves to "Done".
#   - pull_request.opened/reopened: moves the PR to "In progress".
#   - pull_request.ready_for_review: moves the PR to "In review".
#   - pull_request.closed (merged=true): moves to "Done".
#   - pull_request.closed (merged=false): returns to the author's column.

name: Project Router

on:
  workflow_call:
    inputs:
      project-owner:
        description: 'GitHub Project owner (user or org)'
        required: true
        type: string
      project-number:
        description: 'GitHub Project v2 number'
        required: true
        type: number
    secrets:
      PROJECT_TOKEN:
        description: 'PAT with project + repo scope. Required because GITHUB_TOKEN cannot access Projects v2.'
        required: true

jobs:
  route:
    runs-on: ubuntu-latest
    steps:
      - name: Route item to project column
        uses: actions/github-script@v7
        env:
          PROJECT_OWNER: ${{ inputs.project-owner }}
          PROJECT_NUMBER: ${{ inputs.project-number }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const PROJECT_OWNER = process.env.PROJECT_OWNER
            const PROJECT_NUMBER = parseInt(process.env.PROJECT_NUMBER, 10)
            const FLOW_COLUMNS = ['In progress', 'In review', 'Done']

            const event = context.eventName
            const action = context.payload.action
            const isIssue = event === 'issues'
            const item = isIssue ? context.payload.issue : context.payload.pull_request
            const author = item.user.login
            const assignee = item.assignee ? item.assignee.login : null
            const merged = !isIssue && context.payload.pull_request.merged

            // 1. Determine the target column
            let targetColumn = null
            const key = `${event}-${action}`
            switch (key) {
              case 'issues-opened':
              case 'issues-reopened':
              case 'issues-assigned':
              case 'issues-unassigned':
                targetColumn = assignee || author
                break
              case 'issues-closed':
                targetColumn = 'Done'
                break
              case 'pull_request-opened':
              case 'pull_request-reopened':
                targetColumn = 'In progress'
                break
              case 'pull_request-ready_for_review':
                targetColumn = 'In review'
                break
              case 'pull_request-closed':
                targetColumn = merged ? 'Done' : author
                break
              default:
                core.info(`Event ${key} ignored.`)
                return
            }
            core.info(`Target column: ${targetColumn}`)

            // 2. Fetch the Project (try user, then org)
            const fetchProject = async (ownerType) => {
              const queryUser = `
                query($owner: String!, $number: Int!) {
                  user(login: $owner) {
                    projectV2(number: $number) {
                      id
                      fields(first: 50) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            id name
                            options { id name }
                          }
                        }
                      }
                    }
                  }
                }`
              const queryOrg = queryUser.replace('user(login:', 'organization(login:')
              const query = ownerType === 'user' ? queryUser : queryOrg
              const result = await github.graphql(query, { owner: PROJECT_OWNER, number: PROJECT_NUMBER })
              return result[ownerType]?.projectV2 ?? null
            }

            let ownerType = 'user'
            let project = null
            try {
              project = await fetchProject('user')
            } catch (_) {}
            if (!project) {
              ownerType = 'organization'
              try {
                project = await fetchProject('organization')
              } catch (_) {}
            }
            if (!project) {
              core.setFailed(`Project ${PROJECT_OWNER}/${PROJECT_NUMBER} not found.`)
              return
            }

            const statusField = project.fields.nodes.find((f) => f && f.name === 'Status')
            if (!statusField) {
              core.setFailed('"Status" field not found in the Project. Create it via the /new-project skill.')
              return
            }

            // 3. Resolve the display name (if it is a user login, fetch the real name)
            let columnDisplayName = targetColumn
            if (!FLOW_COLUMNS.includes(targetColumn)) {
              try {
                const { data: user } = await github.rest.users.getByUsername({ username: targetColumn })
                if (user.name) columnDisplayName = user.name
              } catch (_) {
                // Keep the login if it cannot be resolved (bots, deleted account, etc.)
              }
            }

            // 4. Ensure the column exists (create it if needed, with semantic colors)
            const COLOR = { 'In progress': 'YELLOW', 'In review': 'PURPLE', Done: 'GREEN' }
            let option = statusField.options.find((o) => o.name === columnDisplayName)
            if (!option) {
              core.info(`Column '${columnDisplayName}' does not exist — creating...`)
              const personals = statusField.options.filter((o) => !FLOW_COLUMNS.includes(o.name))
              const newOptions = [
                ...personals.map((o) => ({ name: o.name, color: 'GRAY', description: '' })),
                { name: columnDisplayName, color: 'GRAY', description: '' },
                { name: 'In progress', color: COLOR['In progress'], description: '' },
                { name: 'In review', color: COLOR['In review'], description: '' },
                { name: 'Done', color: COLOR.Done, description: '' },
              ]
              const result = await github.graphql(
                `mutation($fieldId: ID!, $options: [ProjectV2SingleSelectFieldOptionInput!]!) {
                  updateProjectV2Field(input: { fieldId: $fieldId, singleSelectOptions: $options }) {
                    projectV2Field {
                      ... on ProjectV2SingleSelectField {
                        options { id name }
                      }
                    }
                  }
                }`,
                { fieldId: statusField.id, options: newOptions },
              )
              option = result.updateProjectV2Field.projectV2Field.options.find((o) => o.name === columnDisplayName)
              if (!option) {
                core.setFailed(`Failed to create column '${columnDisplayName}'.`)
                return
              }
            }

            // 5. Add the item to the Project (idempotent — returns the existing one if already there)
            const addResult = await github.graphql(
              `mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item { id }
                }
              }`,
              { projectId: project.id, contentId: item.node_id },
            )
            const itemId = addResult.addProjectV2ItemById.item.id

            // 6. Anti-mess: if the issue is already in the flow (In progress/In review/Done) and
            //    the event is only a reassign, do not send it back to the personal column.
            if (key === 'issues-assigned' || key === 'issues-unassigned') {
              const currentResult = await github.graphql(
                `query($projectId: ID!) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      items(first: 200) {
                        nodes {
                          id
                          fieldValues(first: 20) {
                            nodes {
                              ... on ProjectV2ItemFieldSingleSelectValue {
                                field { ... on ProjectV2SingleSelectField { name } }
                                name
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }`,
                { projectId: project.id },
              )
              const currentItem = currentResult.node.items.nodes.find((n) => n.id === itemId)
              const currentStatus = currentItem?.fieldValues.nodes.find((v) => v.field?.name === 'Status')?.name
              if (FLOW_COLUMNS.includes(currentStatus)) {
                core.info(`Item is already in the flow ('${currentStatus}'); reassign does not move it.`)
                return
              }
            }

            // 7. Apply Status
            await github.graphql(
              `mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item { id }
                }
              }`,
              { projectId: project.id, itemId, fieldId: statusField.id, optionId: option.id },
            )
            core.info(`Item moved to '${columnDisplayName}'.`)
