# Project Router — routes issues and PRs to the product's GitHub Project v2.
# The logic lives in the local reusable workflow (_project-router-reusable.yml);
# this file is just the "glue" that listens to the repo's events and delegates.
#
# Configuration in the repo:
#   - Project v2 created in your account or organization, with a Status field
#   - PROJECT_TOKEN secret (PAT with project + repo scope)
#   - project-number below: the Project v2 number for this product

name: Project Router

on:
  issues:
    types: [opened, reopened, assigned, unassigned, closed]
  pull_request:
    types: [opened, reopened, ready_for_review, closed]

jobs:
  route:
    uses: ./.github/workflows/_project-router-reusable.yml
    secrets:
      PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
    with:
      project-owner: __PROJECT_OWNER__
      project-number: __PROJECT_NUMBER__
