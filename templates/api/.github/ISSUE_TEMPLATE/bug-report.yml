name: Bug Report
description: Report a bug you found
title: '[BUG] '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How do you reproduce the bug?
      placeholder: |
        1. Send a request to '...'
        2. With payload '...'
        3. See the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include the response body or log excerpt if you have it.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Logs / screenshots
      description: If applicable, add log lines (with the trace_id) or screenshots

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - SEV-4 (Minor - next business day)
        - SEV-3 (Non-critical - <4 hours)
        - SEV-2 (Critical - <30 min)
        - SEV-1 (Outage - immediate)
    validations:
      required: true
