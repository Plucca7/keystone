# Adapted from the ops template's issue forms. Every piece of work starts as
# an issue: one branch = one issue = one PR, so a well-formed issue is the
# unit of traceability.
name: Feature Request
description: Suggest a new feature
title: '[FEATURE] '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: 'Today I have to do X manually and it is slow...'
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you imagine the solution?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know it is done? These become the PR's verifiable "done" target.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other solutions you thought about?
