# Project Router — encaminha issues e PRs para o GitHub Project v2 do produto.
# A lógica fica no workflow reutilizável local (_project-router-reusable.yml),
# este arquivo é só a "cola" que escuta os eventos do repo e delega.
#
# Configuração no repo:
#   - Project v2 criado na sua conta ou organização, com campo Status
#   - Secret PROJECT_TOKEN (PAT com escopo project + repo)
#   - project-number abaixo: número do Project v2 deste produto

name: Project Router

on:
  issues:
    types: [opened, reopened, assigned, unassigned, closed]
  pull_request:
    types: [opened, reopened, ready_for_review, closed]

jobs:
  route:
    uses: ./.github/workflows/_project-router-reusable.yml
    secrets:
      PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
    with:
      project-owner: __PROJECT_OWNER__
      project-number: __PROJECT_NUMBER__
