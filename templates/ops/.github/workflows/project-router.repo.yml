# Project Router for github-ops itself.
# Glue that listens to issue/PR events and delegates to the reusable workflow
# (defined in this same repo, at .github/workflows/project-router.yml).
#
# Configuration:
#   - Official Project: https://github.com/your-org/projects/1 (Platform Roadmap)
#   - Required secret: PROJECT_TOKEN (PAT with project + repo scope)
#
# Why the file is named project-router.repo.yml and not project-router.yml:
#   the reusable workflow is already named project-router.yml; keeping a distinct
#   name avoids confusion in the GitHub UI.

name: Project Router (this repo)

on:
  issues:
    types: [opened, reopened, assigned, unassigned, closed]
  pull_request:
    types: [opened, reopened, ready_for_review, closed]

jobs:
  route:
    uses: ./.github/workflows/project-router.yml
    secrets:
      PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
    with:
      project-owner: your-org
      project-number: 4
