name: E2E Tests

# Playwright foundation (standard). Runs on PRs that touch code or config.
# Blocks merge on failure. Configure as a required check in branch protection.

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

# Cancels previous runs of the same PR to save minutes
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # Version is detected from the "packageManager" field in package.json — single source of truth.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Playwright browser cache — saves ~2min per run
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (if browser came from cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      # Production build of the app — Playwright serves it via `pnpm start` (faster + more realistic than dev).
      # Replace/add env vars according to your project's setup (Supabase, APIs, etc).
      - name: Build app
        run: pnpm build

      - name: Run Playwright tests
        run: pnpm test:e2e
        env:
          CI: 'true'
          # Adapt: test user credentials for the authenticated flow (specs in critical/).
          # If your project has no auth yet, delete these envs — only smoke runs.
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

      # HTML report as an artifact for post-mortem debugging on failure
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14
