name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    uses: ./.github/workflows/_ci-reusable.yml
    with:
      node-version: '20'
      # pnpm, not npm: this template ships a pnpm-lock.yaml, and setup-node's
      # npm cache fails outright when package-lock.json is absent.
      package-manager: 'pnpm'
