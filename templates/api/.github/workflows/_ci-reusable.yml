# CI Pipeline
# Reusable workflow for TypeScript projects
# Ref: https://example.com/handbook
#
# Usage in another repo:
#   jobs:
#     ci:
#       uses: your-org/github-ops/.github/workflows/ci.yml@main

name: CI

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      package-manager:
        description: 'Package manager (npm, pnpm, yarn)'
        required: false
        type: string
        default: 'npm'
      run-e2e:
        description: 'Run E2E tests'
        required: false
        type: boolean
        default: false

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm must be available BEFORE setup-node, because the setup-node cache
      # validates the lockfile (pnpm-lock.yaml) and runs `pnpm` when it is the
      # chosen package manager. The official pnpm action is the idiomatic way.
      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: ${{ inputs.package-manager }} install

      - name: TypeScript type-check
        run: ${{ inputs.package-manager }} run typecheck

      - name: Lint
        run: ${{ inputs.package-manager }} run lint

      # Decision: call the dedicated coverage script instead of
      # "test -- --coverage". With pnpm, a "--" in "pnpm run test -- --flag"
      # is not stripped before forwarding, so vitest never sees --coverage
      # and the step silently runs plain tests with no report. test:coverage
      # already wires --coverage in package.json, so this works the same
      # across npm/pnpm/yarn and cannot regress into that footgun.
      - name: Unit tests with coverage
        run: ${{ inputs.package-manager }} run test:coverage

      - name: Build
        run: ${{ inputs.package-manager }} run build

      # if-no-files-found: error turns a missing coverage/ folder into a
      # failed step instead of the default silent warning -- a green
      # "Upload coverage" must mean coverage genuinely ran, never that the
      # folder was absent.
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
          if-no-files-found: error

  e2e:
    name: E2E Tests
    if: ${{ inputs.run-e2e }}
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: ${{ inputs.package-manager }} install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: ${{ inputs.package-manager }} run test:e2e

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
